<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ডেলিভারি তথ্য - My Product</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230b6fa3'/%3E%3Cstop offset='1' stop-color='%2379c9f2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='url(%23g)'/%3E%3Ctext x='34' y='43' font-family='Arial,Helvetica,sans-serif' font-size='27' font-weight='800' fill='white' text-anchor='middle' transform='skewX(-9)' letter-spacing='-1'%3EMP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Baloo+Da+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#eaf7ff; --sky-2:#cdecff; --sky-3:#79c9f2; --sky-4:#1e9bd7; --sky-5:#0b6fa3;
    --navy:#0b3a52; --coral:#ff6a3d; --coral-dark:#e04e22; --red:#e6293f; --green:#1fa969; --gray:#5b7686;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Hind Siliguri',sans-serif; background:var(--sky-1); color:var(--navy); }
  h1,h2,h3{ font-family:'Baloo Da 2','Hind Siliguri',sans-serif; }
  a{ text-decoration:none; color:inherit; }

  header{ background:linear-gradient(135deg,var(--sky-5),var(--sky-4)); padding:16px 18px; }
  .top{ max-width:820px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .brand{ color:#fff; font-weight:800; font-size:20px; display:flex; align-items:center; gap:8px; }
  .back-btn{ background:rgba(255,255,255,0.18); color:#fff; padding:8px 16px; border-radius:30px; font-weight:600; font-size:13.5px; border:1.5px solid rgba(255,255,255,0.5); }
  .back-btn:hover{ background:#fff; color:var(--sky-5); }

  .hero{ background:linear-gradient(180deg,var(--sky-3),var(--sky-1)); padding:36px 18px 30px; text-align:center; }
  .hero h1{ font-size:clamp(22px,4vw,32px); margin-bottom:8px; }
  .hero p{ color:var(--sky-5); font-size:15px; font-weight:500; max-width:520px; margin:0 auto; }

  .wrap{ max-width:820px; margin:0 auto; padding:30px 18px 60px; }

  .charge-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:26px; }
  .charge-card{ background:#fff; border-radius:16px; padding:20px; box-shadow:0 4px 12px rgba(11,58,82,0.08); text-align:center; }
  .charge-card .zone{ font-weight:700; font-size:15px; color:var(--sky-5); margin-bottom:6px; }
  .charge-card .price{ font-size:24px; font-weight:800; color:var(--coral-dark); margin-bottom:4px; }
  .charge-card .time{ font-size:13px; color:var(--gray); }
  @media(max-width:520px){ .charge-grid{ grid-template-columns:1fr; } }

  .acc-item{ background:#fff; border-radius:16px; margin-bottom:14px; box-shadow:0 4px 12px rgba(11,58,82,0.08); overflow:hidden; border:2px solid transparent; }
  .acc-item.open{ border-color:var(--sky-3); }
  .acc-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px; cursor:pointer; gap:14px; }
  .acc-head h3{ font-size:16px; color:var(--navy); display:flex; align-items:center; gap:10px; }
  .acc-head .num{ background:var(--sky-2); color:var(--sky-5); width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex:none; }
  .acc-head .arrow{ transition:.25s; color:var(--sky-5); font-size:18px; flex:none; }
  .acc-item.open .arrow{ transform:rotate(180deg); }
  .acc-body{ max-height:0; overflow:hidden; transition:max-height .3s ease; padding:0 20px; }
  .acc-item.open .acc-body{ padding:0 20px 20px 20px; }
  .acc-body ul{ padding-left:20px; }
  .acc-body li{ margin-bottom:8px; font-size:14.5px; line-height:1.7; color:var(--navy); }
  .acc-body p{ font-size:14.5px; line-height:1.7; color:var(--navy); margin-bottom:10px; }

  .cta-box{ background:linear-gradient(120deg,var(--sky-5),var(--sky-4)); border-radius:20px; padding:26px 24px; color:#fff; text-align:center; margin-top:26px; }
  .cta-box h3{ font-size:19px; margin-bottom:8px; }
  .cta-box p{ font-size:14px; opacity:.9; margin-bottom:16px; }
  .cta-box a.wa-btn{ display:inline-flex; align-items:center; gap:8px; background:#fff; color:var(--sky-5); padding:11px 24px; border-radius:30px; font-weight:700; font-size:14.5px; }
  .cta-box a.wa-btn:hover{ background:var(--sky-2); }

  footer{ text-align:center; padding:20px; color:var(--gray); font-size:12.5px; }
</style>
</head>
<body>

<header>
  <div class="top">
    <div class="brand">🛍️ My Product</div>
    <a class="back-btn" href="index.html">← হোমপেজে ফিরে যান</a>
  </div>
</header>

<section class="hero">
  <h1>ডেলিভারি তথ্য</h1>
  <p>আপনার অর্ডার কতদিনে পৌঁছাবে, ডেলিভারি চার্জ কত, আর পেমেন্ট পদ্ধতি কী — সব তথ্য নিচে দেওয়া হলো।</p>
</section>

<main class="wrap">
  <div class="charge-grid">
    <div class="charge-card">
      <div class="zone">📍 ঢাকার ভেতরে</div>
      <div class="price">৳ ৭০</div>
      <div class="time">ডেলিভারি সময়: ১-২ কার্যদিবস</div>
    </div>
    <div class="charge-card">
      <div class="zone">🚚 ঢাকার বাইরে</div>
      <div class="price">৳ ১২০</div>
      <div class="time">ডেলিভারি সময়: ৩-৫ কার্যদিবস</div>
    </div>
  </div>

  <div id="accWrap"></div>
</main>

<footer>© 2026 My Product. সর্বস্বত্ব সংরক্ষিত।</footer>

<script>
const deliveryData = [
  {
    title: "কোন কোন এলাকায় ডেলিভারি দেওয়া হয়?",
    body: `<p>আমরা সারা বাংলাদেশে ডেলিভারি করে থাকি — ঢাকা শহরের ভেতরে ও বাইরে সব জেলাতেই। কুরিয়ার সার্ভিসের মাধ্যমে দুর্গম এলাকাতেও পৌঁছানোর চেষ্টা করা হয়।</p>`
  },
  {
    title: "ডেলিভারি চার্জ কত?",
    body: `<ul>
      <li><b>ঢাকার ভেতরে:</b> ৳৭০ (নির্দিষ্ট এলাকায় ফ্রি ডেলিভারি অফার মাঝে মাঝে চলতে পারে)</li>
      <li><b>ঢাকার বাইরে (সারা দেশে):</b> ৳১২০</li>
      <li>ভারী পণ্য (যেমন ল্যাপটপ, বড় ইলেকট্রনিক্স) এর ক্ষেত্রে চার্জ কিছুটা ভিন্ন হতে পারে, অর্ডারের সময় নিশ্চিত করে জানানো হবে</li>
    </ul>`
  },
  {
    title: "ডেলিভারি হতে কতদিন লাগে?",
    body: `<ul>
      <li><b>ঢাকার ভেতরে:</b> ১-২ কার্যদিবস</li>
      <li><b>ঢাকার বাইরে:</b> ৩-৫ কার্যদিবস</li>
      <li>উৎসব মৌসুমে (ঈদ, পূজা ইত্যাদি) সময় কিছুটা বেশি লাগতে পারে</li>
      <li>প্রি-অর্ডার/কাস্টম পণ্যের ক্ষেত্রে সময় আলাদাভাবে জানানো হবে</li>
    </ul>`
  },
  {
    title: "পেমেন্ট পদ্ধতি কী কী?",
    body: `<ul>
      <li><b>ক্যাশ অন ডেলিভারি (COD):</b> পণ্য হাতে পেয়ে টাকা পরিশোধ — সবচেয়ে জনপ্রিয় ও সহজ পদ্ধতি</li>
      <li><b>বিকাশ/নগদ/রকেট:</b> চাইলে অগ্রিম পেমেন্টও করতে পারবেন</li>
      <li>বড় অঙ্কের অর্ডারে আংশিক অগ্রিম পেমেন্ট চাওয়া হতে পারে</li>
    </ul>`
  },
  {
    title: "অর্ডার কীভাবে ট্র্যাক করবো?",
    body: `<p>অর্ডার করার পর WhatsApp এই আমাদের সাথে সরাসরি যোগাযোগ থাকে — অর্ডার কনফার্মেশন, প্যাকেজিং, এবং ডেলিভারির অবস্থা সবকিছু WhatsApp মেসেজেই আপডেট দেওয়া হয়। কুরিয়ার হাতে দেওয়ার পর ট্র্যাকিং নম্বরও শেয়ার করা হবে।</p>`
  },
  {
    title: "ডেলিভারির সময় পণ্য চেক করতে পারবো?",
    body: `<p>হ্যাঁ, ডেলিভারিম্যান উপস্থিত থাকা অবস্থাতেই প্যাকেজ খুলে পণ্য যাচাই করে নেওয়ার পরামর্শ দেওয়া হয়, বিশেষ করে ইলেকট্রনিক্স/মোবাইল/ল্যাপটপের ক্ষেত্রে। কোনো সমস্যা থাকলে তখনই ডেলিভারিম্যানকে জানান বা সাথে সাথে আমাদের WhatsApp এ মেসেজ দিন।</p>`
  },
  {
    title: "ডেলিভারি না পেলে বা দেরি হলে কী করবো?",
    body: `<p>প্রতিশ্রুত সময়ের মধ্যে ডেলিভারি না পৌঁছালে সরাসরি নিচের WhatsApp বাটনে যোগাযোগ করুন — আমরা সাথে সাথে কুরিয়ারের সাথে যোগাযোগ করে হালনাগাদ তথ্য জানিয়ে দেব।</p>`
  },
];

const wrap = document.getElementById('accWrap');
deliveryData.forEach((item, i)=>{
  const el = document.createElement('div');
  el.className = 'acc-item';
  el.innerHTML = `
    <div class="acc-head">
      <h3><span class="num">${i+1}</span> ${item.title}</h3>
      <span class="arrow">▾</span>
    </div>
    <div class="acc-body">${item.body}</div>`;
  el.querySelector('.acc-head').onclick = ()=>{
    const body = el.querySelector('.acc-body');
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.acc-item').forEach(other=>{
      other.classList.remove('open');
      other.querySelector('.acc-body').style.maxHeight = null;
    });
    if(!isOpen){
      el.classList.add('open');
      body.style.maxHeight = body.scrollHeight + 40 + 'px';
    }
  };
  wrap.appendChild(el);
});

const cta = document.createElement('div');
cta.className = 'cta-box';
cta.innerHTML = `
  <h3>ডেলিভারি নিয়ে কোনো প্রশ্ন আছে?</h3>
  <p>সরাসরি আমাদের WhatsApp এ যোগাযোগ করুন, দ্রুত সাহায্য পাবেন</p>
  <a class="wa-btn" href="https://wa.me/8801851717924" target="_blank">💬 WhatsApp এ যোগাযোগ করুন</a>`;
wrap.appendChild(cta);
</script>
</body>
</html>
